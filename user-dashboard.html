<div class="form-group">
    <label>Target Session Time-Slot</label>
    <select id="apptTimeSlot" name="Time_Slot" class="form-control" required>
        <option value="">Select 30-Min Time Window</option>
        <optgroup label="Morning Sessions">
            <option value="10:00 AM">10:00 AM</option>
            <option value="10:30 AM">10:30 AM</option>
            <option value="11:00 AM">11:00 AM</option>
            <option value="11:30 AM">11:30 AM</option>
            <option value="12:00 PM">12:00 PM</option>
            <option value="12:30 PM">12:30 PM</option>
        </optgroup>
        <optgroup label="Evening Sessions">
            <option value="04:00 PM">04:00 PM</option>
            <option value="04:30 PM">04:30 PM</option>
            <option value="05:00 PM">05:00 PM</option>
            <option value="05:30 PM">05:30 PM</option>
            <option value="06:00 PM">06:00 PM</option>
            <option value="06:30 PM">06:30 PM</option>
        </optgroup>
    </select>
</div>

<script>
    function handleAppointmentBooking(event) {
        try {
            const randomNumber = Math.floor(1000 + Math.random() * 9000);
            const apptNumber = `APT-2026-${randomNumber}`;
            
            const hiddenNumEl = document.getElementById('hiddenApptNum');
            if(hiddenNumEl) hiddenNumEl.value = apptNumber;

            const nameValue = document.getElementById('patientName') ? document.getElementById('patientName').value : "Unknown Patient";
            const deptValue = document.getElementById('clinicalDept') ? document.getElementById('clinicalDept').value : "General";
            const doctorValue = document.getElementById('doctorSpec') ? document.getElementById('doctorSpec').value : "Staff";
            const dateValue = document.getElementById('apptDate') ? document.getElementById('apptDate').value : "";
            // Added to track the 30-minute selection
            const timeSlotValue = document.getElementById('apptTimeSlot') ? document.getElementById('apptTimeSlot').value : "10:00 AM";

            const appointmentObject = {
                apptNumber: apptNumber,
                name: nameValue,
                dept: deptValue,
                doctor: doctorValue,
                date: dateValue,
                timeSlot: timeSlotValue, // Storing time slot
                status: 'Confirmed'
            };

            let currentLogsArray = [];
            try {
                currentLogsArray = JSON.parse(localStorage.getItem('clinicAppointments')) || [];
            } catch(e) { currentLogsArray = []; }
            
            currentLogsArray.push(appointmentObject);
            localStorage.setItem('clinicAppointments', JSON.stringify(currentLogsArray));

            alert(`Success!\nAppointment generated for: ${nameValue}\nTime Slot: ${timeSlotValue}\nReference Code: ${apptNumber}`);
            return true;
        } catch(error) {
            console.error("Form error caught safely: ", error);
            return true;
        }
    }

    window.onload = function() {
        try {
            const tableEl = document.getElementById('patientTable');
            if (!tableEl) return;
            
            const tableBody = tableEl.getElementsByTagName('tbody')[0];
            if (!tableBody) return;

            let currentLogsArray = [];
            try {
                currentLogsArray = JSON.parse(localStorage.getItem('clinicAppointments')) || [];
            } catch(e) { currentLogsArray = []; }
            
            currentLogsArray.forEach(appt => {
                const row = tableBody.insertRow();
                // Added timeSlot directly next to the date column layout
                row.innerHTML = `
                    <td>#${appt.apptNumber || 'N/A'}</td>
                    <td><strong>${appt.name || 'N/A'}</strong></td>
                    <td>${appt.dept || 'N/A'}</td>
                    <td>${appt.date || 'N/A'} (${appt.timeSlot || '10:00 AM'})</td>
                    <td><span class="badge confirmed">${appt.status || 'Confirmed'}</span></td>
                `;
            });
        } catch(error) {
            console.error("Table display error caught safely: ", error);
        }
    }
</script>
